<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Whiteboard App</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
</head>

<body>
<div class="container">

    <!-- Tools Panel -->
    <section class="tools-board">

        <div class="row">
            <label class="title">Shapes</label>
            <ul class="options">
                <li class="option tool" id="rectangle"><img src="icons/rectangle.svg"><span>Rectangle</span></li>
                <li class="option tool" id="circle"><img src="icons/circle.svg"><span>Circle</span></li>
                <li class="option tool" id="triangle"><img src="icons/triangle.svg"><span>Triangle</span></li>
                <li class="option">
                    <input type="checkbox" id="fill-color">
                    <label for="fill-color">Fill</label>
                </li>
            </ul>
        </div>

        <div class="row">
            <label class="title">Options</label>
            <ul class="options">
                <li class="option active tool" id="brush"><img src="icons/brush.svg"><span>Brush</span></li>
                <li class="option tool" id="eraser"><img src="icons/eraser.svg"><span>Eraser</span></li>
                <li class="option">
                    <input type="range" id="size-slider" min="1" max="30" value="5">
                </li>
            </ul>
        </div>

    <div class="row colors">
    <label class="title">Colors</label>
    <ul class="options">
    <li class="option selected"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
    <li class="option"></li>
</ul>

            
        </div>

        <button class="clear-canvas">Clear Canvas</button>
        <button class="save-img">Save Image</button>

    </section>

    <!-- Drawing Board -->
    <section class="drawing-board">
        <canvas></canvas>
    </section>

</div>
</body>
</html>
